<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webui-temp</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restores the path stashed by 404.html above, if any - this runs
      // once the real app's index.html has loaded, and rewrites the URL
      // back to what the person actually wanted BEFORE react-router
      // initializes, so it picks up the correct route on first render.
      (function () {
        const redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
