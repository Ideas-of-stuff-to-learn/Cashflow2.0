# .github/workflows/supabase-keep-alive.yml
#
# Pings the Supabase project every few days to reset its inactivity
# timer, preventing the free tier's 7-day auto-pause. Any successful
# database/API request counts as activity - this just needs to land
# comfortably within that 7-day window, so every 3 days gives a safe
# buffer even if one scheduled run happens to fail silently.
#
# IMPORTANT: this is a widely used, generally reliable workaround, but
# it is NOT an officially guaranteed Supabase feature - treat it as a
# strong mitigation to run ALONGSIDE the separate backup workflow
# (supabase-backup.yml), not as an absolute guarantee pausing can never
# happen.
#
# SETUP REQUIRED before this will work:
# 1. Add a repository secret named SUPABASE_URL - your project's API
#    URL, found in the Supabase dashboard under Project Settings -> API
#    (looks like https://xxxxx.supabase.co).
# 2. Add a repository secret named SUPABASE_ANON_KEY - the "anon"
#    public API key, found on that same Project Settings -> API page.
#    This is safe to use here since it's the same key already exposed
#    in the deployed frontend - never use the service_role key in a
#    workflow like this.

name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 08:00 UTC - comfortably inside the 7-day pause
    # window, with buffer in case a single run fails.
    - cron: '0 8 */3 * *'
  # Also allows triggering a ping manually from the Actions tab.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to reset the inactivity timer
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Supabase responded with status $response"

          # Fail the run loudly (shows as a red X in the Actions tab)
          # if the ping didn't succeed, rather than silently passing -
          # a failed run here is worth noticing, since it means the
          # inactivity timer did NOT get reset this time.
          if [ "$response" != "200" ]; then
            echo "Ping failed - check SUPABASE_URL / SUPABASE_ANON_KEY secrets, or whether the project is already paused."
            exit 1
          fi
